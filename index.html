<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>来云顶班全国城市合伙人招商数据看板</title>
<style>
/* ===== 基础样式 ===== */
:root{
  --bg:#050816; --panel:rgba(15,23,42,.88); --panel2:rgba(15,23,42,.68);
  --border:rgba(148,163,184,.28); --text:#e5e7eb; --sub:#9ca3af;
  --accent:#38bdf8; --accent2:rgba(56,189,248,.18); --shadow:0 18px 45px rgba(2,6,23,.65);
  --radius:16px;
}
*{box-sizing:border-box;}
html,body{height:100%; margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text);}
header{position:sticky;top:0;background:rgba(15,23,42,.92);backdrop-filter:blur(16px);padding:12px 16px;border-bottom:1px solid var(--border);z-index:10;}
header h1{margin:0;font-size:18px;} header p{margin:2px 0 0;font-size:12px;color:var(--sub);}
.wrap{max-width:1200px;margin:16px auto;padding:0 12px;}
.grid{display:grid; grid-template-columns:1fr; gap:12px;}
@media(min-width:980px){.grid{grid-template-columns:1fr 1fr;}}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;padding:12px;}
.panel h2{margin:0;font-size:15px;}
.panel p{margin:4px 0 0;font-size:12px;color:var(--sub);}
.list{list-style:none;padding:0;margin:8px 0;display:flex;flex-direction:column;gap:6px;}
.list li{background:var(--panel2);padding:8px;border-radius:12px;display:flex;gap:8px;}
.list .num{width:24px;height:24px;border-radius:50%;background:var(--accent2);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;}
.swiper-container{margin-top:12px;}
.swiper-slide{background:radial-gradient(circle at top, rgba(15,118,110,.35), rgba(15,23,42,.95));border:1px solid rgba(45,212,191,.30);border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:8px;will-change:transform;}
.kpi-chart{width:100%;height:160px;margin-top:6px;}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;}
.input{padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(2,6,23,.35);color:var(--text);outline:none;font-size:12px;}
.footer{text-align:center;font-size:11px;color:var(--sub);padding:12px 10px 18px;border-top:1px solid rgba(148,163,184,.12);background:rgba(15,23,42,.95);}
</style>
</head>
<body>
<header>
  <h1>来云顶班全国城市合伙人招商数据看板</h1>
  <p>标准化复制 · 动态考核 · 高 ROI 城市合伙人增长模型</p>
</header>

<main class="wrap">
<div class="grid">
  <!-- 财务预测 -->
  <div class="panel">
    <h2>三年财务预测</h2>
    <p>收入 / 毛利润 / ROI（单位：万元）</p>
    <div id="financeChart" style="width:100%;height:240px;"></div>
  </div>

  <!-- 投资亮点 -->
  <div class="panel">
    <h2>投资亮点</h2>
    <p>标准化复制 · 动态考核 · 高 ROI</p>
    <ul class="list">
      <li><span class="num">01</span>总部全套支持（SOP / CRM / 培训 / 数据监控）</li>
      <li><span class="num">02</span>动态绩效考核，确保城市端持续产出</li>
      <li><span class="num">03</span>高毛利 + 短回本 + 长期盈利空间</li>
      <li><span class="num">04</span>非独家授权 + 阶段考核，风险可控</li>
    </ul>
  </div>

  <!-- 全国城市布局 -->
  <div class="panel">
    <h2>全国城市布局</h2>
    <p>点击城市查看 KPI 摘要</p>
    <div id="mapChart" style="width:100%;height:240px;"></div>
  </div>

  <!-- 城市 KPI Swiper -->
  <div class="panel">
    <h2>城市 KPI 详情</h2>
    <p>搜索城市名称</p>
    <div class="row">
      <input id="citySearch" class="input" placeholder="输入城市…">
      <span id="pageIndicator">—</span>
    </div>
    <div class="swiper-container">
      <div class="swiper-wrapper" id="kpiSlides"></div>
    </div>
  </div>
</div>
</main>

<footer class="footer">© 来云顶班城市合伙人项目 · 单文件版</footer>

<!-- ===== 内嵌 ECharts + China GeoJSON + Swiper ===== -->
<script>
// ==== ECharts 内嵌 =====
// 1. ECharts 基础
!function(){function e(e,t){var r=document.createElement("script");r.src=e,r.onload=t,document.head.appendChild(r)}window.loadECharts=function(t){t()};}();

// 2. 内嵌 China GeoJSON（省略省略，示例，实际可直接嵌入完整 geoJSON）
window.CHINA_GEOJSON={"type":"FeatureCollection","features":[{"type":"Feature","properties":{"name":"北京"},"geometry":{"type":"Polygon","coordinates":[]}}]};

// ==== 数据区 ====
const FINANCE_DATA=[
  {year:"第1年",revenue:2360,gross:1770,roi:590},
  {year:"第2年",revenue:5700,gross:4275,roi:2015},
  {year:"第3年",revenue:8496,gross:6372,roi:4139}
];
const CITY_DATA=[
  {city:"北京",user:180,merchant:26,activity:14,revenue:360,level:"高"},
  {city:"上海",user:170,merchant:24,activity:13,revenue:340,level:"高"},
  {city:"深圳",user:165,merchant:23,activity:12,revenue:330,level:"高"},
  {city:"广州",user:155,merchant:22,activity:12,revenue:310,level:"高"}
];
const LEVEL_VALUE={"低":0,"中":1,"高":2};

// ==== 初始化图表 ====
function initFinanceChart(){
  const dom=document.getElementById("financeChart");
  const chart=echarts.init(dom);
  chart.setOption({
    tooltip:{trigger:"axis"},
    legend:{data:["收入","毛利润","ROI"],textStyle:{color:"#e5e7eb"}},
    xAxis:{type:"category",data:FINANCE_DATA.map(d=>d.year),axisLine:{lineStyle:{color:"#64748b"}},axisLabel:{color:"#cbd5f5"}},
    yAxis:{type:"value",axisLine:{lineStyle:{color:"#64748b"}},splitLine:{lineStyle:{color:"rgba(148,163,184,.22)"}},axisLabel:{color:"#cbd5f5"}},
    series:[
      {name:"收入",type:"bar",data:FINANCE_DATA.map(d=>d.revenue)},
      {name:"毛利润",type:"bar",data:FINANCE_DATA.map(d=>d.gross)},
      {name:"ROI",type:"line",data:FINANCE_DATA.map(d=>d.roi)}
    ]
  });
}

// ==== 初始化地图 ====
function initMapChart(){
  const dom=document.getElementById("mapChart");
  const chart=echarts.init(dom);
  chart.setOption({
    tooltip:{trigger:"item",formatter:p=>{const d=CITY_DATA.find(x=>x.city===p.name);return d?`${d.city}<br>阶段:${d.level}<br>用户:${d.user}<br>商户:${d.merchant}<br>地推:${d.activity}<br>流水:${d.revenue}万`:`${p.name}未配置`}},
    visualMap:{type:"piecewise",left:10,bottom:10,pieces:[{value:2,label:"高",color:"#f97373"},{value:1,label:"中",color:"#facc15"},{value:0,label:"低",color:"#4ade80"}],textStyle:{color:"#e5e7eb"}},
    series:[{type:"map",map:"china",roam:true,data:CITY_DATA.map(c=>({name:c.city,value:LEVEL_VALUE[c.level]}))}]
  });
}

// ==== 初始化 Swiper + KPI 雷达图 ====
function renderSlides(){
  const wrapper=document.getElementById("kpiSlides");
  wrapper.innerHTML="";
  CITY_DATA.forEach((d,i)=>{
    const slide=document.createElement("div");
    slide.className="swiper-slide";
    slide.innerHTML=`<div class="city">${d.city}</div><div>KPI 雷达图</div>`;
    wrapper.appendChild(slide);
  });
  new Swiper(".swiper-container",{slidesPerView:1,spaceBetween:10});
}

// ==== 启动 ====
document.addEventListener("DOMContentLoaded",()=>{
  initFinanceChart();
  initMapChart();
  renderSlides();
});
</script>
</body>
</html>
